name: PR Target Branch Check

on:
  pull_request_target:
    types: [opened, edited]

jobs:
  check-target:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    # Skip develop→master PRs (maintainer releases)
    if: >-
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.head.ref != 'develop'
    steps:
      - name: Add wrong-base label and comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['wrong-base']
            });

            // Post comment
            const body = `Automatic message from CI checks : It seems like this branch is targeting the wrong branch, any contribution should target develop branch.

            See [CONTRIBUTING.md](https://github.com/TokenFleet-AI/rtk/blob/master/CONTRIBUTING.md) for details.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: body
            });
